<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithms Quiz</title>
    <style>
      :root {
        --bg: #0f0f1a;
        --card: #1a1a2e;
        --card-hover: #1f1f35;
        --accent: #4361ee;
        --accent2: #7209b7;
        --green: #06d6a0;
        --red: #ef476f;
        --yellow: #ffd166;
        --text: #e8e8e8;
        --text-dim: #888;
        --border: #2a2a40;
        --radius: 12px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }

      /* ─── Header ─── */
      .app-header {
        text-align: center;
        padding: 40px 20px 30px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 0 0 30px 30px;
        margin-bottom: 30px;
        box-shadow: 0 4px 30px rgba(67, 97, 238, 0.3);
      }

      .app-header h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      .app-header p {
        font-size: 14px;
        opacity: 0.85;
      }

      /* ─── Setup Screen ─── */
      .setup-section {
        background: var(--card);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
      }

      .setup-section h3 {
        font-size: 16px;
        margin-bottom: 16px;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .chapter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 8px;
      }

      .chapter-btn {
        background: var(--bg);
        border: 2px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        font-size: 13px;
      }

      .chapter-btn:hover {
        border-color: var(--accent);
        background: var(--card-hover);
      }
      .chapter-btn.selected {
        border-color: var(--accent);
        background: rgba(67, 97, 238, 0.15);
      }

      .chapter-btn .ch-num {
        font-weight: 700;
        color: var(--accent);
      }
      .chapter-btn .ch-count {
        color: var(--text-dim);
        font-size: 11px;
        float: right;
        margin-top: 2px;
      }

      .diff-btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .diff-btn {
        flex: 1;
        min-width: 100px;
        padding: 12px 16px;
        border-radius: 8px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        font-size: 14px;
      }

      .diff-btn:hover {
        border-color: var(--accent);
      }
      .diff-btn.selected {
        border-color: var(--accent);
        background: rgba(67, 97, 238, 0.15);
      }
      .diff-btn .emoji {
        font-size: 20px;
        display: block;
        margin-bottom: 4px;
      }

      .count-input {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .count-input input {
        width: 100px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 16px;
        text-align: center;
      }

      .count-input input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .start-btn {
        width: 100%;
        padding: 16px;
        font-size: 18px;
        font-weight: 700;
        border: none;
        border-radius: var(--radius);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
        letter-spacing: 0.5px;
      }

      .start-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
      }
      .start-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* ─── Quiz Screen ─── */
      .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .quiz-stats {
        display: flex;
        gap: 16px;
        font-size: 14px;
      }

      .stat-item {
        background: var(--card);
        padding: 8px 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
      }

      .stat-item .label {
        color: var(--text-dim);
        font-size: 11px;
      }
      .stat-item .value {
        font-weight: 700;
        font-size: 16px;
      }

      .progress-container {
        width: 100%;
        height: 8px;
        background: var(--card);
        border-radius: 4px;
        margin-bottom: 24px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 4px;
        transition: width 0.4s ease;
      }

      .timer-bar {
        width: 100%;
        height: 4px;
        background: var(--card);
        border-radius: 2px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .timer-fill {
        height: 100%;
        background: var(--green);
        border-radius: 2px;
        transition:
          width 0.1s linear,
          background-color 0.3s;
      }

      .timer-fill.warning {
        background: var(--yellow);
      }
      .timer-fill.danger {
        background: var(--red);
      }

      .question-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 28px;
        margin-bottom: 16px;
        border: 1px solid var(--border);
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .q-meta {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .q-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .badge-easy {
        background: rgba(6, 214, 160, 0.15);
        color: var(--green);
      }
      .badge-medium {
        background: rgba(255, 209, 102, 0.15);
        color: var(--yellow);
      }
      .badge-hard {
        background: rgba(239, 71, 111, 0.15);
        color: var(--red);
      }
      .badge-chapter {
        background: rgba(67, 97, 238, 0.15);
        color: var(--accent);
      }
      .badge-multi {
        background: rgba(114, 9, 183, 0.15);
        color: #b5179e;
      }

      .q-text {
        font-size: 17px;
        line-height: 1.6;
        margin-bottom: 20px;
        white-space: pre-line;
      }

      .options-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option-btn {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px 18px;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        font-size: 15px;
        line-height: 1.4;
      }

      .option-btn:hover:not(.disabled) {
        border-color: var(--accent);
        background: var(--card-hover);
      }

      .option-btn .letter {
        min-width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: var(--card);
        font-weight: 700;
        font-size: 14px;
        flex-shrink: 0;
      }

      .option-btn.selected {
        border-color: var(--accent);
        background: rgba(67, 97, 238, 0.1);
      }
      .option-btn.selected .letter {
        background: var(--accent);
        color: white;
      }

      .option-btn.correct {
        border-color: var(--green);
        background: rgba(6, 214, 160, 0.1);
      }
      .option-btn.correct .letter {
        background: var(--green);
        color: white;
      }

      .option-btn.wrong {
        border-color: var(--red);
        background: rgba(239, 71, 111, 0.1);
      }
      .option-btn.wrong .letter {
        background: var(--red);
        color: white;
      }

      .option-btn.disabled {
        cursor: default;
        opacity: 0.7;
      }
      .option-btn.show-correct {
        border-color: var(--green);
        background: rgba(6, 214, 160, 0.08);
      }

      .feedback {
        padding: 16px 20px;
        border-radius: 10px;
        margin-top: 16px;
        font-weight: 600;
        font-size: 15px;
        animation: fadeIn 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .feedback.correct {
        background: rgba(6, 214, 160, 0.12);
        color: var(--green);
        border: 1px solid rgba(6, 214, 160, 0.3);
      }
      .feedback.wrong {
        background: rgba(239, 71, 111, 0.12);
        color: var(--red);
        border: 1px solid rgba(239, 71, 111, 0.3);
      }

      .next-btn {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius);
        background: var(--accent);
        color: white;
        cursor: pointer;
        margin-top: 16px;
        transition: all 0.2s;
      }

      .next-btn:hover {
        background: #3651d4;
        transform: translateY(-1px);
      }

      /* Multi-select confirm button */
      .confirm-btn {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border: 2px solid var(--accent);
        border-radius: var(--radius);
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        margin-top: 12px;
        transition: all 0.2s;
      }

      .confirm-btn:hover {
        background: var(--accent);
        color: white;
      }

      /* ─── Results Screen ─── */
      .results-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 32px;
        text-align: center;
        border: 1px solid var(--border);
        animation: slideIn 0.5s ease;
      }

      .results-score {
        font-size: 64px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 20px 0 10px;
      }

      .results-pct {
        font-size: 24px;
        color: var(--text-dim);
        margin-bottom: 20px;
      }

      .results-bar {
        width: 100%;
        height: 12px;
        background: var(--bg);
        border-radius: 6px;
        margin: 20px 0;
        overflow: hidden;
      }

      .results-bar-fill {
        height: 100%;
        border-radius: 6px;
        transition: width 1s ease;
      }

      .results-msg {
        font-size: 18px;
        margin: 20px 0;
      }

      .results-details {
        text-align: left;
        margin-top: 24px;
      }

      .results-details h3 {
        margin-bottom: 12px;
        color: var(--accent);
      }

      .wrong-item {
        background: var(--bg);
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 8px;
        border-left: 3px solid var(--red);
      }

      .wrong-item .wi-q {
        font-size: 13px;
        margin-bottom: 6px;
      }
      .wrong-item .wi-a {
        font-size: 12px;
        color: var(--green);
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn-group button {
        flex: 1;
      }

      .secondary-btn {
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border: 2px solid var(--accent);
        border-radius: var(--radius);
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        transition: all 0.2s;
      }

      .secondary-btn:hover {
        background: rgba(67, 97, 238, 0.1);
      }

      .select-all-btn {
        padding: 8px 16px;
        font-size: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--text-dim);
        cursor: pointer;
        margin-bottom: 10px;
      }

      .select-all-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }

      /* ─── Streak indicator ─── */
      .streak {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 700;
        animation: fadeIn 0.3s;
        z-index: 100;
      }

      .streak.hot {
        border-color: var(--yellow);
        color: var(--yellow);
      }

      /* Hide screens */
      .hidden {
        display: none !important;
      }

      @media (max-width: 600px) {
        .container {
          padding: 10px;
        }
        .app-header h1 {
          font-size: 22px;
        }
        .question-card {
          padding: 18px;
        }
        .q-text {
          font-size: 15px;
        }
        .chapter-grid {
          grid-template-columns: 1fr;
        }
        .quiz-stats {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <!-- ═══ SETUP SCREEN ═══ -->
    <div id="setup-screen">
      <div class="app-header">
        <h1>Algorithms Quiz</h1>
        <p>
          865 frågor &bull; 10 Ämnen &bull; Pseudokod &bull; Alla
          svårighetsgrader
        </p>
      </div>

      <div class="container">
        <div class="setup-section">
          <h3>📚 Välj Ämne</h3>
          <button class="select-all-btn" onclick="toggleAllChapters()">
            Välj alla / Avmarkera alla
          </button>
          <div class="chapter-grid" id="chapter-grid"></div>
        </div>

        <div class="setup-section">
          <h3>📊 Svårighetsgrad</h3>
          <div class="diff-btns">
            <button
              class="diff-btn selected"
              data-diff="all"
              onclick="selectDifficulty(this)"
            >
              <span class="emoji">🎯</span> Alla
            </button>
            <button
              class="diff-btn"
              data-diff="Lätt"
              onclick="selectDifficulty(this)"
            >
              <span class="emoji">🟢</span> Lätt
            </button>
            <button
              class="diff-btn"
              data-diff="Medel"
              onclick="selectDifficulty(this)"
            >
              <span class="emoji">🟡</span> Medel
            </button>
            <button
              class="diff-btn"
              data-diff="Svår"
              onclick="selectDifficulty(this)"
            >
              <span class="emoji">🔴</span> Svår
            </button>
          </div>
        </div>

        <div class="setup-section">
          <h3>📝 Frågetyp</h3>
          <div class="diff-btns">
            <button class="diff-btn selected" data-qtype="all" onclick="selectQuestionType(this)">
              <span class="emoji">🎯</span> Alla
            </button>
            <button class="diff-btn" data-qtype="regular" onclick="selectQuestionType(this)">
              <span class="emoji">📖</span> Vanliga
            </button>
            <button class="diff-btn" data-qtype="pseudo" onclick="selectQuestionType(this)">
              <span class="emoji">💻</span> Pseudokod
            </button>
          </div>
        </div>

        <div class="setup-section">
          <h3>🔢 Antal frågor</h3>
          <div class="count-input">
            <input
              type="number"
              id="q-count"
              min="1"
              value="20"
              placeholder="20"
            />
            <span id="available-count" style="color: var(--text-dim)"></span>
          </div>
        </div>

        <div class="setup-section">
          <h3>⏱️ Timer per fråga</h3>
          <div class="diff-btns">
            <button class="diff-btn" data-timer="0" onclick="selectTimer(this)">
              <span class="emoji">♾️</span> Ingen
            </button>
            <button
              class="diff-btn selected"
              data-timer="30"
              onclick="selectTimer(this)"
            >
              <span class="emoji">⏱️</span> 30 sek
            </button>
            <button
              class="diff-btn"
              data-timer="60"
              onclick="selectTimer(this)"
            >
              <span class="emoji">🕐</span> 60 sek
            </button>
            <button
              class="diff-btn"
              data-timer="15"
              onclick="selectTimer(this)"
            >
              <span class="emoji">⚡</span> 15 sek
            </button>
          </div>
        </div>

        <button class="start-btn" id="start-btn" onclick="startQuiz()">
          Starta Quiz →
        </button>
      </div>
    </div>

    <!-- ═══ QUIZ SCREEN ═══ -->
    <div id="quiz-screen" class="hidden">
      <div class="container">
        <div class="quiz-header">
          <div class="quiz-stats">
            <div class="stat-item">
              <div class="label">Fråga</div>
              <div class="value" id="q-num">1/20</div>
            </div>
            <div class="stat-item">
              <div class="label">Rätt</div>
              <div class="value" id="q-correct" style="color: var(--green)">
                0
              </div>
            </div>
            <div class="stat-item">
              <div class="label">Fel</div>
              <div class="value" id="q-wrong" style="color: var(--red)">0</div>
            </div>
            <div class="stat-item">
              <div class="label">Poäng</div>
              <div class="value" id="q-score" style="color: var(--yellow)">
                0
              </div>
            </div>
          </div>
        </div>

        <div class="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="timer-bar" id="timer-bar-container">
          <div class="timer-fill" id="timer-fill"></div>
        </div>

        <div class="question-card" id="question-card"></div>
      </div>
    </div>

    <!-- ═══ RESULTS SCREEN ═══ -->
    <div id="results-screen" class="hidden">
      <div class="app-header">
        <h1>Resultat</h1>
        <p id="results-subtitle"></p>
      </div>
      <div class="container">
        <div class="results-card" id="results-card"></div>
      </div>
    </div>

    <!-- ═══ STREAK INDICATOR ═══ -->
    <div class="streak hidden" id="streak-indicator"></div>

    <script src="questions.js"></script>
    <script src="new_questions.js"></script>
    <script>
      // Kombinera vanliga frågor + pseudokodfrågor
      const COMBINED_QUESTIONS = [...ALL_QUESTIONS, ...PSEUDOCODE_QUESTIONS];

      // ─── STATE ───
      let state = {
        selectedChapters: new Set(),
        difficulty: "all",
        questionType: "all",
        timerSeconds: 30,
        questions: [],
        currentIndex: 0,
        correctCount: 0,
        wrongCount: 0,
        score: 0,
        streak: 0,
        maxStreak: 0,
        wrongQuestions: [],
        timerInterval: null,
        timeLeft: 0,
        answered: false,
        multiSelected: new Set(),
      };

      // ─── SETUP ───
      function init() {
        const chapters = {};
        COMBINED_QUESTIONS.forEach((q) => {
          if (!chapters[q.chapter]) {
            chapters[q.chapter] = { name: q.chapter_name, count: 0 };
          }
          chapters[q.chapter].count++;
        });

        const grid = document.getElementById("chapter-grid");
        Object.keys(chapters)
          .sort((a, b) => a - b)
          .forEach((ch) => {
            const btn = document.createElement("button");
            btn.className = "chapter-btn";
            btn.dataset.chapter = ch;
            btn.innerHTML = `<span class="ch-num"> ${chapters[ch].name}</span> <span class="ch-count">${chapters[ch].count} frågor</span><br><span style="font-size:12px;color:var(--text-dim)"></span>`;
            btn.onclick = () => toggleChapter(btn, parseInt(ch));
            grid.appendChild(btn);
          });

        updateAvailableCount();
      }

      function toggleChapter(btn, ch) {
        if (state.selectedChapters.has(ch)) {
          state.selectedChapters.delete(ch);
          btn.classList.remove("selected");
        } else {
          state.selectedChapters.add(ch);
          btn.classList.add("selected");
        }
        updateAvailableCount();
      }

      function selectQuestionType(btn) {
        state.questionType = btn.dataset.qtype;
        document.querySelectorAll('[data-qtype]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        updateAvailableCount();
      }

      function toggleAllChapters() {
        const btns = document.querySelectorAll(".chapter-btn");
        const allSelected = state.selectedChapters.size === btns.length;
        btns.forEach((btn) => {
          const ch = parseInt(btn.dataset.chapter);
          if (allSelected) {
            state.selectedChapters.delete(ch);
            btn.classList.remove("selected");
          } else {
            state.selectedChapters.add(ch);
            btn.classList.add("selected");
          }
        });
        updateAvailableCount();
      }

      function selectDifficulty(btn) {
        document
          .querySelectorAll(".diff-btns .diff-btn[data-diff]")
          .forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
        state.difficulty = btn.dataset.diff;
        updateAvailableCount();
      }

      function selectTimer(btn) {
        document
          .querySelectorAll(".diff-btns .diff-btn[data-timer]")
          .forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
        state.timerSeconds = parseInt(btn.dataset.timer);
      }

      function updateAvailableCount() {
        const filtered = getFilteredQuestions();
        document.getElementById("available-count").textContent =
          `(${filtered.length} tillgängliga)`;
        const countInput = document.getElementById("q-count");
        countInput.max = filtered.length;
        if (parseInt(countInput.value) > filtered.length) {
          countInput.value = filtered.length;
        }
        document.getElementById("start-btn").disabled = filtered.length === 0;
      }

      function getFilteredQuestions() {
        let filtered;
        if (state.questionType === "regular") {
          filtered = [...ALL_QUESTIONS];
        } else if (state.questionType === "pseudo") {
          filtered = [...PSEUDOCODE_QUESTIONS];
        } else {
          filtered = [...COMBINED_QUESTIONS];
        }
        if (state.selectedChapters.size > 0) {
          filtered = filtered.filter((q) =>
            state.selectedChapters.has(q.chapter),
          );
        }
        if (state.difficulty !== "all") {
          filtered = filtered.filter((q) => q.difficulty === state.difficulty);
        }
        return filtered;
      }

      // ─── QUIZ ───
      function startQuiz() {
        let filtered = getFilteredQuestions();
        // Shuffle
        for (let i = filtered.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
        }

        const count = Math.min(
          parseInt(document.getElementById("q-count").value) || 20,
          filtered.length,
        );
        state.questions = filtered.slice(0, count);
        state.currentIndex = 0;
        state.correctCount = 0;
        state.wrongCount = 0;
        state.score = 0;
        state.streak = 0;
        state.maxStreak = 0;
        state.wrongQuestions = [];

        document.getElementById("setup-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");

        if (state.timerSeconds === 0) {
          document
            .getElementById("timer-bar-container")
            .classList.add("hidden");
        } else {
          document
            .getElementById("timer-bar-container")
            .classList.remove("hidden");
        }

        showQuestion();
      }

      function shuffleOptions(q) {
        const letters = q.options.map(o => o.letter);
        const correctLetters = q.correct_answer.split(",");
        const correctTexts = q.options
          .filter(o => correctLetters.includes(o.letter))
          .map(o => o.text);

        // Fisher-Yates shuffle
        const shuffled = [...q.options];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }

        // Assign new letters
        shuffled.forEach((opt, i) => {
          opt.letter = letters[i];
        });
        q.options = shuffled;

        // Update correct_answer based on new positions
        const newCorrect = q.options
          .filter(o => correctTexts.includes(o.text))
          .map(o => o.letter)
          .sort()
          .join(",");
        q.correct_answer = newCorrect;
      }

      function showQuestion() {
        const q = state.questions[state.currentIndex];
        const total = state.questions.length;
        state.answered = false;
        state.multiSelected = new Set();

        // Shuffle options so correct answer isn't always the same letter
        shuffleOptions(q);

        // Update stats
        document.getElementById("q-num").textContent =
          `${state.currentIndex + 1}/${total}`;
        document.getElementById("q-correct").textContent = state.correctCount;
        document.getElementById("q-wrong").textContent = state.wrongCount;
        document.getElementById("q-score").textContent = state.score;
        document.getElementById("progress-bar").style.width =
          `${(state.currentIndex / total) * 100}%`;

        // Difficulty badge
        const diffClass =
          q.difficulty === "Lätt"
            ? "badge-easy"
            : q.difficulty === "Medel"
              ? "badge-medium"
              : "badge-hard";

        let html = `
    <div class="q-meta">
      <span class="q-badge ${diffClass}">${q.difficulty}</span>
      ${q.is_multi ? '<span class="q-badge badge-multi">Flera svar</span>' : ""}
    </div>
    <div class="q-text">${escapeHtml(q.question)}</div>
    <div class="options-list">
  `;

        q.options.forEach((opt) => {
          html += `
      <button class="option-btn" data-letter="${opt.letter}" onclick="${q.is_multi ? `toggleMulti('${opt.letter}')` : `selectAnswer('${opt.letter}')`}">
        <span class="letter">${opt.letter}</span>
        <span>${escapeHtml(opt.text)}</span>
      </button>
    `;
        });

        html += "</div>";

        if (q.is_multi) {
          html +=
            '<button class="confirm-btn" id="confirm-multi" onclick="confirmMulti()">Bekräfta svar</button>';
        }

        html += '<div id="feedback-area"></div>';

        document.getElementById("question-card").innerHTML = html;

        // Start timer
        if (state.timerSeconds > 0) {
          startTimer();
        }
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function toggleMulti(letter) {
        if (state.answered) return;
        const btn = document.querySelector(
          `.option-btn[data-letter="${letter}"]`,
        );
        if (state.multiSelected.has(letter)) {
          state.multiSelected.delete(letter);
          btn.classList.remove("selected");
        } else {
          state.multiSelected.add(letter);
          btn.classList.add("selected");
        }
      }

      function confirmMulti() {
        if (state.answered || state.multiSelected.size === 0) return;
        const answer = [...state.multiSelected].sort().join(",");
        checkAnswer(answer);
      }

      function selectAnswer(letter) {
        if (state.answered) return;
        checkAnswer(letter);
      }

      function checkAnswer(userAnswer) {
        state.answered = true;
        stopTimer();

        const q = state.questions[state.currentIndex];
        const correct = q.correct_answer;
        const correctNorm = correct.split(",").sort().join(",");
        const userNorm = userAnswer.split(",").sort().join(",");
        const isCorrect = correctNorm === userNorm;

        // Disable all buttons
        document
          .querySelectorAll(".option-btn")
          .forEach((btn) => btn.classList.add("disabled"));

        // Hide confirm button for multi
        const confirmBtn = document.getElementById("confirm-multi");
        if (confirmBtn) confirmBtn.style.display = "none";

        // Show correct/wrong
        const correctLetters = correct.split(",");
        const userLetters = userAnswer.split(",");

        document.querySelectorAll(".option-btn").forEach((btn) => {
          const letter = btn.dataset.letter;
          if (correctLetters.includes(letter)) {
            btn.classList.add("correct");
          }
          if (
            userLetters.includes(letter) &&
            !correctLetters.includes(letter)
          ) {
            btn.classList.add("wrong");
          }
        });

        // Points: Easy=1, Medium=2, Hard=3, streak bonus
        const diffPoints = { Lätt: 1, Medel: 2, Svår: 3 };
        let points = 0;

        if (isCorrect) {
          state.correctCount++;
          state.streak++;
          if (state.streak > state.maxStreak) state.maxStreak = state.streak;
          points = diffPoints[q.difficulty] || 1;
          if (state.streak >= 3) points += Math.min(state.streak - 2, 3); // Streak bonus
          state.score += points;
          showStreak();
        } else {
          state.wrongCount++;
          state.streak = 0;
          state.wrongQuestions.push(q);
          hideStreak();
        }

        // Feedback
        const feedbackArea = document.getElementById("feedback-area");
        let feedbackHtml = "";

        if (isCorrect) {
          feedbackHtml = `<div class="feedback correct">✅ Rätt!${points > 1 ? ` +${points} poäng` : " +1 poäng"}${state.streak >= 3 ? ` 🔥 ${state.streak} i rad!` : ""}</div>`;
        } else {
          const correctTexts = q.options
            .filter((o) => correctLetters.includes(o.letter))
            .map((o) => `${o.letter}) ${o.text}`)
            .join(", ");
          feedbackHtml = `<div class="feedback wrong">❌ Fel! Rätt svar: ${escapeHtml(correctTexts)}</div>`;
        }

        feedbackHtml += `<button class="next-btn" onclick="nextQuestion()">${state.currentIndex < state.questions.length - 1 ? "Nästa fråga →" : "Se resultat →"}</button>`;
        feedbackArea.innerHTML = feedbackHtml;

        // Update stats
        document.getElementById("q-correct").textContent = state.correctCount;
        document.getElementById("q-wrong").textContent = state.wrongCount;
        document.getElementById("q-score").textContent = state.score;
      }

      function nextQuestion() {
        state.currentIndex++;
        if (state.currentIndex >= state.questions.length) {
          showResults();
        } else {
          showQuestion();
        }
      }

      // ─── TIMER ───
      function startTimer() {
        state.timeLeft = state.timerSeconds;
        updateTimerDisplay();
        state.timerInterval = setInterval(() => {
          state.timeLeft -= 0.1;
          if (state.timeLeft <= 0) {
            state.timeLeft = 0;
            stopTimer();
            if (!state.answered) {
              checkAnswer("TIMEOUT");
            }
          }
          updateTimerDisplay();
        }, 100);
      }

      function stopTimer() {
        if (state.timerInterval) {
          clearInterval(state.timerInterval);
          state.timerInterval = null;
        }
      }

      function updateTimerDisplay() {
        const fill = document.getElementById("timer-fill");
        const pct = (state.timeLeft / state.timerSeconds) * 100;
        fill.style.width = `${pct}%`;
        fill.classList.remove("warning", "danger");
        if (pct < 20) fill.classList.add("danger");
        else if (pct < 50) fill.classList.add("warning");
      }

      // ─── STREAK ───
      function showStreak() {
        if (state.streak >= 3) {
          const el = document.getElementById("streak-indicator");
          el.classList.remove("hidden");
          el.classList.toggle("hot", state.streak >= 5);
          el.textContent = `🔥 ${state.streak} i rad!`;
        }
      }

      function hideStreak() {
        document.getElementById("streak-indicator").classList.add("hidden");
      }

      // ─── RESULTS ───
      function showResults() {
        stopTimer();
        hideStreak();
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("results-screen").classList.remove("hidden");

        const total = state.questions.length;
        const pct = Math.round((state.correctCount / total) * 100);

        let color, msg, emoji;
        if (pct >= 90) {
          color = "var(--green)";
          msg = "Fantastiskt! Du är redo för tentan!";
          emoji = "🌟";
        } else if (pct >= 70) {
          color = "var(--green)";
          msg = "Bra jobbat! Fortsätt så!";
          emoji = "💪";
        } else if (pct >= 50) {
          color = "var(--yellow)";
          msg = "Okej! Fokusera på svaga kapitel.";
          emoji = "📖";
        } else {
          color = "var(--red)";
          msg = "Du behöver plugga mer. Ge inte upp!";
          emoji = "🎯";
        }

        document.getElementById("results-subtitle").textContent =
          `${state.correctCount} av ${total} rätt`;

        let html = `
    <div style="font-size:48px;margin-bottom:10px">${emoji}</div>
    <div class="results-score">${state.correctCount}/${total}</div>
    <div class="results-pct">${pct}%</div>
    <div class="results-bar"><div class="results-bar-fill" style="width:0%;background:${color}"></div></div>
    <div class="results-msg">${msg}</div>
    <div style="display:flex;gap:20px;justify-content:center;margin:16px 0;flex-wrap:wrap">
      <div class="stat-item"><div class="label">Poäng</div><div class="value" style="color:var(--yellow)">${state.score}</div></div>
      <div class="stat-item"><div class="label">Max streak</div><div class="value" style="color:var(--yellow)">🔥 ${state.maxStreak}</div></div>
    </div>
  `;

        if (state.wrongQuestions.length > 0) {
          html += `<div class="results-details"><h3>❌ Frågor du hade fel på (${state.wrongQuestions.length})</h3>`;
          state.wrongQuestions.forEach((q) => {
            const correctLetters = q.correct_answer.split(",");
            const correctTexts = q.options
              .filter((o) => correctLetters.includes(o.letter))
              .map((o) => `${o.letter}) ${o.text}`)
              .join(", ");
            html += `
        <div class="wrong-item">
          <div class="wi-q">${escapeHtml(q.question).substring(0, 120)}${q.question.length > 120 ? "..." : ""}</div>
          <div class="wi-a">→ ${escapeHtml(correctTexts)}</div>
        </div>
      `;
          });
          html += "</div>";
        }

        html += `
    <div class="btn-group">
      <button class="secondary-btn" onclick="retryWrong()">Öva fel-frågor</button>
      <button class="start-btn" onclick="backToSetup()">Nytt quiz</button>
    </div>
  `;

        document.getElementById("results-card").innerHTML = html;

        // Animate bar
        setTimeout(() => {
          document.querySelector(".results-bar-fill").style.width = `${pct}%`;
        }, 100);
      }

      function retryWrong() {
        if (state.wrongQuestions.length === 0) return;
        state.questions = [...state.wrongQuestions];
        // Shuffle
        for (let i = state.questions.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [state.questions[i], state.questions[j]] = [
            state.questions[j],
            state.questions[i],
          ];
        }
        state.currentIndex = 0;
        state.correctCount = 0;
        state.wrongCount = 0;
        state.score = 0;
        state.streak = 0;
        state.maxStreak = 0;
        state.wrongQuestions = [];

        document.getElementById("results-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");
        showQuestion();
      }

      function backToSetup() {
        document.getElementById("results-screen").classList.add("hidden");
        document.getElementById("setup-screen").classList.remove("hidden");
      }

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (document.getElementById("quiz-screen").classList.contains("hidden"))
          return;

        const key = e.key.toUpperCase();
        if (["A", "B", "C", "D", "E"].includes(key) && !state.answered) {
          const q = state.questions[state.currentIndex];
          if (q.is_multi) {
            toggleMulti(key);
          } else {
            selectAnswer(key);
          }
        } else if (e.key === "Enter") {
          if (state.answered) {
            nextQuestion();
          } else {
            const q = state.questions[state.currentIndex];
            if (q.is_multi && state.multiSelected.size > 0) {
              confirmMulti();
            }
          }
        }
      });

      // Init
      init();
    </script>
  </body>
</html>
